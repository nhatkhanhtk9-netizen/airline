# ==============================================================
# CONFIGURATION FOR LOCAL & HOSTING (Railway, Render, Google Cloud)
# ==============================================================

# Database Connection (Uses Environment Variables if available, else defaults to H2)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:airline_db;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${SPRING_JPA_PLATFORM:org.hibernate.dialect.H2Dialect}

# Server Port (Hosting will usually provide this via PORT env)
server.port=${PORT:8080}

# Email Configuration (Uses Environment Variables)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# H2 Console (Only for development, disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Optimization for Hosting
spring.devtools.restart.enabled=false
spring.sql.init.mode=never

