<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm chuyến bay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">✈️ Tìm chuyến bay</h2>

    <form action="/searchflight/search" method="get" class="row g-3">

        <div class="col-md-4">
            <label class="form-label">Nơi đi</label>
            <input type="text" name="from" class="form-control" required>
        </div>

        <div class="col-md-4">
            <label class="form-label">Nơi đến</label>
            <input type="text" name="to" class="form-control" required>
        </div>

        <div class="col-md-4">
            <label class="form-label">Ngày bay</label>
            <input type="date" name="date" class="form-control" required>
        </div>

        <div class="col-12">
            <button class="btn btn-primary w-100">🔍 Tìm chuyến bay</button>
        </div>
    </form>
</div>

</body>
</html>
