<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kết quả tìm kiếm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h3 class="mb-3">
        ✈️ Kết quả: 
        <span th:text="${from}"></span> → <span th:text="${to}"></span> /
        <span th:text="${date}"></span>
    </h3>

    <div th:if="${flights.size() == 0}" class="alert alert-warning">
        Không tìm thấy chuyến bay nào phù hợp.
    </div>

    <table th:if="${flights.size() > 0}" class="table table-bordered table-hover">
        <thead class="table-primary">
        <tr>
            <th>Hãng bay</th>
            <th>Nơi đi</th>
            <th>Nơi đến</th>
            <th>Ngày bay</th>
            <th>Giá</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="f : ${flights}">
            <td th:text="${f.airline}"></td>
            <td th:text="${f.fromCity}"></td>
            <td th:text="${f.toCity}"></td>
            <td th:text="${f.date}"></td>
            <td th:text="${#numbers.formatDecimal(f.price,0,',','.')} + ' VND'"></td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
