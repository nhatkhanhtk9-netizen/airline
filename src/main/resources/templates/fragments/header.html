<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style th:fragment="header-styles">
        :root {
            --primary-color: #0061f2; /* Xanh đậm hơn chuyên nghiệp */
            --secondary-color: #00cfd5;
            --dark-text: #1a202c;
            --light-bg: #ffffff;
            --accent-blue: #e0eaff;
        }

        /* --- Header Container --- */
        .navbar-top {
            background: #ffffff;
            border-bottom: 2px solid var(--accent-blue);
            padding: 0.8rem 0;
        }

        /* --- Logo --- */
        .brand-text {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-color) !important;
            -webkit-text-fill-color: initial;
            background: none;
        }

        /* --- Search Bar --- */
        .search-input {
            border-radius: 12px !important;
            padding-left: 20px !important;
            border: 2px solid var(--accent-blue) !important;
            background: #f8fbff !important;
            height: 46px !important;
        }
        .search-input:focus {
            background: #ffffff !important;
            border-color: var(--primary-color) !important;
        }

        /* --- Service Menu (Bar 2) --- */
        .service-nav-bar {
            background: var(--primary-color);
            padding: 0;
        }
        .service-link {
            font-size: 0.9rem;
            font-weight: 700;
            color: #ffffff !important;
            padding: 12px 20px !important;
            border-radius: 0;
            transition: background 0.2s;
        }
        .service-link:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff !important;
        }
        .service-link.active {
            background: rgba(0, 0, 0, 0.1);
        }

        /* --- User Profile --- */
        .user-nav-box {
            background: var(--accent-blue);
            border: none;
        }
        .user-nav-box:hover {
            background: #ccdfff;
        }
        .user-avatar-nav {
            background: var(--primary-color);
        }

        /* --- Promo Button --- */
        .btn-promo {
            background: #fff9e6;
            color: #d97706 !important;
            border: 1px solid #fde68a;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 50px;
            padding: 5px 15px !important;
        }
        .btn-promo:hover {
            background: #fef3c7;
        }

        @media (max-width: 991.98px) {
            .search-wrapper { max-width: 100%; margin: 10px 0; }
            .user-nav-box { margin-top: 10px; }
        }
    </style>
</head>
<body>

<div th:fragment="header">
    <!-- BAR 1: Top Navigation -->
    <nav class="navbar navbar-expand-lg navbar-top">
        <div class="container">
            <!-- Logo -->
            <a class="navbar-brand d-flex align-items-center me-4" href="/">
                <img src="/images/logo.png" alt="FlyBooking">
                <span class="brand-text ms-2">FlyBooking</span>
            </a>

            <!-- Search Bar (Desktop) -->
            <div class="d-none d-lg-block flex-grow-1 mx-4">
                <form action="/search" method="get" class="search-wrapper">
                    <input type="text" name="query" class="form-control search-input" placeholder="Tìm chuyến bay, khách sạn, điểm đến...">
                    <button class="btn btn-primary search-btn" type="submit">
                        <i class="bi bi-search"></i>
                    </button>
                </form>
            </div>

            <!-- Mobile Toggler -->
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <i class="bi bi-list fs-2 text-primary"></i>
            </button>

            <!-- Menu items -->
            <div class="collapse navbar-collapse" id="mainNavbar">
                <!-- Search Bar (Mobile) -->
                <div class="d-lg-none mt-3 mb-2">
                    <form action="/search" method="get" class="search-wrapper w-100">
                        <input type="text" name="query" class="form-control search-input" placeholder="Tìm kiếm...">
                        <button class="btn btn-primary search-btn" type="submit">
                            <i class="bi bi-search"></i>
                        </button>
                    </form>
                </div>

                <ul class="navbar-nav ms-auto align-items-center gap-lg-3">
                    <li class="nav-item">
                        <a href="/promotions" class="nav-link nav-link-custom btn-promo">
                            <i class="bi bi-gift-fill"></i> Khuyến mãi
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="/my-booking">
                            <i class="bi bi- suitcase-lg-fill"></i> Đặt chỗ
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle nav-link-custom" href="#" data-bs-toggle="dropdown">VNĐ</a>
                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm">
                            <li><a class="dropdown-item small" href="?currency=VND">VNĐ - Vietnam Dong</a></li>
                            <li><a class="dropdown-item small" href="?currency=USD">USD - US Dollar</a></li>
                        </ul>
                    </li>

                    <!-- User Section -->
                    <th:block th:if="${session.loggedInUser != null}">
                        <li class="nav-item">
                            <a th:href="@{/profile}" class="user-nav-box">
                                <div class="user-avatar-nav">
                                    <img th:if="${session.loggedInUser.profileImage != null}" th:src="@{'/images/avatars/' + ${session.loggedInUser.profileImage}}" alt="Avatar">
                                    <span th:if="${session.loggedInUser.profileImage == null}" th:text="${#strings.substring(session.loggedInUser.fullName, 0, 1)}">U</span>
                                </div>
                                <span class="user-name-nav" th:text="${session.loggedInUser.fullName}">User Name</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-danger small fw-bold" th:href="@{/logout}">Đăng xuất</a>
                        </li>
                    </th:block>

                    <th:block th:if="${session.loggedInUser == null}">
                        <li class="nav-item">
                            <a class="btn btn-primary btn-sm rounded-pill px-3" href="/login">Đăng nhập</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-outline-primary btn-sm rounded-pill px-3" href="/register">Đăng ký</a>
                        </li>
                    </th:block>
                </ul>
            </div>
        </div>
    </nav>

    <!-- BAR 2: Service Menu -->
    <div class="service-nav-bar d-none d-lg-block">
        <div class="container">
            <ul class="nav justify-content-center gap-2">
                <li><a th:href="@{/flights}" class="nav-link service-link"><i class="bi bi-airplane"></i> Vé Máy Bay</a></li>
                <li><a href="/hotels" class="nav-link service-link"><i class="bi bi-building"></i> Khách sạn</a></li>
                <li><a href="/trains" class="nav-link service-link"><i class="bi bi-train-front"></i> Tàu hỏa</a></li>
                <li><a href="/buses" class="nav-link service-link"><i class="bi bi-bus-front"></i> Xe khách</a></li>
                <li><a href="/activities" class="nav-link service-link"><i class="bi bi-ticket-perforated"></i> Trải nghiệm</a></li>
                <li><a href="/car-rental" class="nav-link service-link"><i class="bi bi-car-front"></i> Thuê xe</a></li>
            </ul>
        </div>
    </div>
</div>

</body>
</html>
