<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - FlyBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: url('/images/nen2.webp') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }
        .register-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 500px;
            padding: 15px;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        .register-card h2 {
            font-weight: 600;
            color: #333;
            margin-bottom: 25px;
            text-align: center;
        }
        .form-control {
            border-radius: 10px;
            padding: 10px 15px;
            border: 1px solid #ddd;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
            border-color: #0d6efd;
        }
        .btn-register {
            background: linear-gradient(45deg, #198754, #20c997);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(25, 135, 84, 0.4);
            color: white;
        }
        .error-msg {
            background-color: #fff2f2;
            color: #d9534f;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #ffdada;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.95rem;
        }
        .login-link a {
            color: #198754;
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 576px) {
            body { padding: 20px 0; }
            .register-card {
                padding: 25px 20px;
                border-radius: 15px;
            }
            .register-card h2 {
                font-size: 1.5rem;
                margin-bottom: 20px;
            }
            .form-control {
                padding: 8px 12px;
                font-size: 0.9rem;
            }
            .btn-register {
                padding: 10px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="register-card">
        <h2>Tạo Tài Khoản</h2>
        
        <div th:if="${error}" class="error-msg" th:text="${error}"></div>
        
        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="mb-3">
                <label for="fullName" class="form-label small fw-bold">Họ và tên</label>
                <input type="text" th:field="*{fullName}" class="form-control" id="fullName" placeholder="Nguyễn Văn A" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label small fw-bold">Email</label>
                <input type="email" th:field="*{email}" class="form-control" id="email" placeholder="name@example.com" required>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label small fw-bold">Số điện thoại</label>
                <input type="text" th:field="*{phone}" class="form-control" id="phone" placeholder="0123456789" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="password" class="form-label small fw-bold">Mật khẩu</label>
                    <input type="password" th:field="*{password}" class="form-control" id="password" placeholder="••••••••" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="confirmPassword" class="form-label small fw-bold">Xác nhận</label>
                    <input type="password" name="confirmPassword" class="form-control" id="confirmPassword" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-register w-100 shadow-sm">Đăng Ký Ngay</button>
        </form>
        
        <div class="login-link">
            Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
