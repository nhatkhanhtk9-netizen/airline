<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang cá nhân - FlyBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #0061f2;
            --bg-body: #f0f5ff;
            --card-shadow: 0 15px 35px rgba(0, 97, 242, 0.05);
            --accent-blue: #e0eaff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: #1a202c;
        }

        .main-content {
            padding: 50px 0;
        }

        /* --- Profile Layout --- */
        .profile-wrapper {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
        }

        /* --- Sidebar Card --- */
        .sidebar-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--accent-blue);
        }

        .profile-avatar-lg {
            background: var(--primary-color);
            border: 5px solid var(--accent-blue);
        }

        .sidebar-nav-item.active {
            background: var(--primary-color);
            color: #ffffff;
        }

        /* --- Content Card --- */
        .content-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 45px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--accent-blue);
        }

        .section-title::before {
            background: var(--primary-color);
            width: 6px;
        }

        .form-control {
            border: 2px solid var(--accent-blue);
            background: #fcfdff;
            padding: 14px 20px;
        }
        .form-control:focus {
            border-color: var(--primary-color);
            background: #ffffff;
        }

        .btn-save {
            background: var(--primary-color);
            padding: 16px 50px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }
    </style>
    <style th:replace="~{fragments/header :: header-styles}"></style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="main-content">
    <div class="container">
        <!-- Breadcrumb -->
        <div class="breadcrumb-custom">
            <a th:href="@{/index1}"><i class="bi bi-chevron-left"></i> Quay lại trang chủ</a>
        </div>

        <div class="profile-wrapper">
            <!-- Sidebar -->
            <aside class="sidebar-card">
                <form id="avatarForm" th:action="@{/profile/update}" method="post" enctype="multipart/form-data">
                    <div class="avatar-container">
                        <div class="profile-avatar-lg">
                            <img th:if="${user.profileImage != null}" th:src="@{'/images/avatars/' + ${user.profileImage}}" alt="Avatar">
                            <span th:if="${user.profileImage == null}" th:text="${#strings.substring(user.fullName, 0, 1)}">U</span>
                        </div>
                        <label for="profilePicInput" class="btn-change-avatar">
                            <i class="bi bi-camera-fill"></i>
                        </label>
                        <input type="file" name="profilePic" id="profilePicInput" style="display: none;" onchange="document.getElementById('avatarForm').submit();">
                    </div>
                    <input type="hidden" name="fullName" th:value="${user.fullName}">
                    <input type="hidden" name="phone" th:value="${user.phone}">
                </form>

                <h4 class="fw-800 mb-1" th:text="${user.fullName}">Name</h4>
                <p class="text-muted small mb-4" th:text="${user.email}">Email</p>

                <div class="sidebar-nav">
                    <div class="sidebar-nav-item active">
                        <i class="bi bi-person-gear"></i> Thông tin cá nhân
                    </div>
                    <div class="sidebar-nav-item">
                        <i class="bi bi-shield-lock"></i> Bảo mật & Đăng nhập
                    </div>
                    <div class="sidebar-nav-item">
                        <i class="bi bi-bell"></i> Thông báo
                    </div>
                </div>
            </aside>

            <!-- Form Content -->
            <section class="content-card">
                <div th:if="${message}" class="alert alert-success alert-custom alert-dismissible fade show">
                    <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${message}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-custom alert-dismissible fade show">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form th:action="@{/profile/update}" method="post" enctype="multipart/form-data">
                    <div class="section-title">Cập nhật hồ sơ</div>
                    
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label for="fullName" class="form-label">Họ và tên đầy đủ</label>
                            <input type="text" name="fullName" class="form-control" id="fullName" th:value="${user.fullName}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="phone" class="form-label">Số điện thoại liên hệ</label>
                            <input type="text" name="phone" class="form-control" id="phone" th:value="${user.phone}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Địa chỉ Email</label>
                            <input type="email" class="form-control" th:value="${user.email}" readonly>
                            <div class="form-text text-muted mt-2 small">Email được dùng để đăng nhập và không thể thay đổi.</div>
                        </div>
                    </div>

                    <div class="section-title mt-5">Thay đổi mật khẩu</div>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label for="newPassword" class="form-label">Mật khẩu mới</label>
                            <input type="password" name="newPassword" class="form-control" id="newPassword" placeholder="••••••••">
                        </div>
                        <div class="col-md-6">
                            <label for="confirmPassword" class="form-label">Xác nhận mật khẩu</label>
                            <input type="password" name="confirmPassword" class="form-control" id="confirmPassword" placeholder="••••••••">
                        </div>
                    </div>

                    <div class="mt-5 pt-2">
                        <button type="submit" class="btn btn-save">Lưu tất cả thay đổi</button>
                    </div>
                </form>
            </section>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
