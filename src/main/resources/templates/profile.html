<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang cá nhân - FlyBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #0d6efd;
            --bg-body: #f4f7fe;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: #2d3748;
        }

        .main-content {
            padding: 40px 0;
        }

        /* --- Breadcrumb Style --- */
        .breadcrumb-custom {
            margin-bottom: 25px;
        }
        .breadcrumb-custom a {
            text-decoration: none;
            color: #718096;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }
        .breadcrumb-custom a:hover {
            color: var(--primary-color);
        }

        /* --- Profile Layout --- */
        .profile-wrapper {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
        }

        @media (max-width: 991.98px) {
            .profile-wrapper { grid-template-columns: 1fr; }
        }

        /* --- Sidebar Card --- */
        .sidebar-card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            text-align: center;
            height: fit-content;
        }

        .avatar-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
        }

        .profile-avatar-lg {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--primary-color), #00d2ff);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 800;
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.15);
            overflow: hidden;
            border: 4px solid white;
        }
        .profile-avatar-lg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-change-avatar {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            color: var(--primary-color);
            transition: all 0.2s;
            border: none;
        }
        .btn-change-avatar:hover {
            background: var(--primary-color);
            color: white;
            transform: scale(1.1);
        }

        .sidebar-nav {
            list-style: none;
            padding: 0;
            margin: 30px 0 0;
            text-align: left;
        }
        .sidebar-nav-item {
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #718096;
            transition: all 0.2s;
        }
        .sidebar-nav-item.active {
            background: #f0f7ff;
            color: var(--primary-color);
        }
        .sidebar-nav-item:hover:not(.active) {
            background: #f8fafc;
            color: #4a5568;
        }

        /* --- Form Card --- */
        .content-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--card-shadow);
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--primary-color);
            border-radius: 10px;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #4a5568;
            margin-bottom: 8px;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 18px;
            border: 1.5px solid #edf2f7;
            background: #f8fafc;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .form-control:focus {
            background: white;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.05);
        }
        .form-control[readonly] {
            background: #edf2f7;
            cursor: not-allowed;
        }

        .btn-save {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(13, 110, 253, 0.15);
        }
        .btn-save:hover {
            background: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(13, 110, 253, 0.25);
        }

        /* --- Custom Alerts --- */
        .alert-custom {
            border-radius: 16px;
            border: none;
            padding: 15px 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
    </style>
    <style th:replace="~{fragments/header :: header-styles}"></style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="main-content">
    <div class="container">
        <!-- Breadcrumb -->
        <div class="breadcrumb-custom">
            <a th:href="@{/index1}"><i class="bi bi-chevron-left"></i> Quay lại trang chủ</a>
        </div>

        <div class="profile-wrapper">
            <!-- Sidebar -->
            <aside class="sidebar-card">
                <form id="avatarForm" th:action="@{/profile/update}" method="post" enctype="multipart/form-data">
                    <div class="avatar-container">
                        <div class="profile-avatar-lg">
                            <img th:if="${user.profileImage != null}" th:src="@{'/images/avatars/' + ${user.profileImage}}" alt="Avatar">
                            <span th:if="${user.profileImage == null}" th:text="${#strings.substring(user.fullName, 0, 1)}">U</span>
                        </div>
                        <label for="profilePicInput" class="btn-change-avatar">
                            <i class="bi bi-camera-fill"></i>
                        </label>
                        <input type="file" name="profilePic" id="profilePicInput" style="display: none;" onchange="document.getElementById('avatarForm').submit();">
                    </div>
                    <input type="hidden" name="fullName" th:value="${user.fullName}">
                    <input type="hidden" name="phone" th:value="${user.phone}">
                </form>

                <h4 class="fw-800 mb-1" th:text="${user.fullName}">Name</h4>
                <p class="text-muted small mb-4" th:text="${user.email}">Email</p>

                <div class="sidebar-nav">
                    <div class="sidebar-nav-item active">
                        <i class="bi bi-person-gear"></i> Thông tin cá nhân
                    </div>
                    <div class="sidebar-nav-item">
                        <i class="bi bi-shield-lock"></i> Bảo mật & Đăng nhập
                    </div>
                    <div class="sidebar-nav-item">
                        <i class="bi bi-bell"></i> Thông báo
                    </div>
                </div>
            </aside>

            <!-- Form Content -->
            <section class="content-card">
                <div th:if="${message}" class="alert alert-success alert-custom alert-dismissible fade show">
                    <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${message}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-custom alert-dismissible fade show">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form th:action="@{/profile/update}" method="post" enctype="multipart/form-data">
                    <div class="section-title">Cập nhật hồ sơ</div>
                    
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label for="fullName" class="form-label">Họ và tên đầy đủ</label>
                            <input type="text" name="fullName" class="form-control" id="fullName" th:value="${user.fullName}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="phone" class="form-label">Số điện thoại liên hệ</label>
                            <input type="text" name="phone" class="form-control" id="phone" th:value="${user.phone}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Địa chỉ Email</label>
                            <input type="email" class="form-control" th:value="${user.email}" readonly>
                            <div class="form-text text-muted mt-2 small">Email được dùng để đăng nhập và không thể thay đổi.</div>
                        </div>
                    </div>

                    <div class="section-title mt-5">Thay đổi mật khẩu</div>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label for="newPassword" class="form-label">Mật khẩu mới</label>
                            <input type="password" name="newPassword" class="form-control" id="newPassword" placeholder="••••••••">
                        </div>
                        <div class="col-md-6">
                            <label for="confirmPassword" class="form-label">Xác nhận mật khẩu</label>
                            <input type="password" name="confirmPassword" class="form-control" id="confirmPassword" placeholder="••••••••">
                        </div>
                    </div>

                    <div class="mt-5 pt-2">
                        <button type="submit" class="btn btn-save">Lưu tất cả thay đổi</button>
                    </div>
                </form>
            </section>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
