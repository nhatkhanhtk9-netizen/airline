<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang cá nhân - FlyBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
        }
        .profile-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
            border: 1px solid #eee;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, #0d6efd, #00d2ff);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: 0 auto 15px;
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
            overflow: hidden; /* Quan trọng để ảnh không tràn */
            position: relative;
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-upload-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 12px;
            padding: 4px 0;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0;
        }
        .profile-avatar:hover .avatar-upload-label {
            opacity: 1;
        }
        .form-label {
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #ddd;
            background-color: #fcfcfc;
        }
        .form-control:focus {
            background-color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
        }
        .btn-update {
            background: linear-gradient(45deg, #0d6efd, #00d2ff);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
        }
        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.4);
            color: white;
        }
        .nav-back {
            margin-bottom: 20px;
        }
        .nav-back a {
            text-decoration: none;
            color: #666;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .nav-back a:hover {
            color: #0d6efd;
        }
    </style>
    <style th:replace="~{fragments/header :: header-styles}"></style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="profile-container">
    <div class="nav-back">
        <a th:href="@{/index1}"><i class="bi bi-arrow-left"></i> Quay lại trang chủ</a>
    </div>

    <div class="profile-card">
        <div class="profile-header">
            <form id="avatarForm" th:action="@{/profile/update}" method="post" enctype="multipart/form-data">
                <div class="profile-avatar">
                    <img th:if="${user.profileImage != null}" th:src="@{'/images/avatars/' + ${user.profileImage}}" alt="Avatar">
                    <span th:if="${user.profileImage == null}" th:text="${#strings.substring(user.fullName, 0, 1)}">U</span>
                    <label for="profilePicInput" class="avatar-upload-label">Thay đổi</label>
                </div>
                <input type="file" name="profilePic" id="profilePicInput" style="display: none;" onchange="document.getElementById('avatarForm').submit();">
                <!-- Hidden fields to keep other data during avatar-only update if needed -->
                <input type="hidden" name="fullName" th:value="${user.fullName}">
                <input type="hidden" name="phone" th:value="${user.phone}">
            </form>
            <h2 class="fw-bold" th:text="${user.fullName}">Họ tên người dùng</h2>
            <p class="text-muted" th:text="${user.email}">email@example.com</p>
        </div>

        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form th:action="@{/profile/update}" method="post" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="fullName" class="form-label">Họ và tên</label>
                    <input type="text" name="fullName" class="form-control" id="fullName" th:value="${user.fullName}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="phone" class="form-label">Số điện thoại</label>
                    <input type="text" name="phone" class="form-control" id="phone" th:value="${user.phone}" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Địa chỉ Email</label>
                <input type="email" class="form-control" id="email" th:value="${user.email}" readonly style="background-color: #e9ecef;">
                <div class="form-text">Email không thể thay đổi.</div>
            </div>

            <hr class="my-4">
            <h5 class="mb-3 fw-bold">Đổi mật khẩu (Bỏ trống nếu không muốn đổi)</h5>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="newPassword" class="form-label">Mật khẩu mới</label>
                    <input type="password" name="newPassword" class="form-control" id="newPassword" placeholder="••••••••">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="confirmPassword" class="form-label">Xác nhận mật khẩu mới</label>
                    <input type="password" name="confirmPassword" class="form-control" id="confirmPassword" placeholder="••••••••">
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-update shadow-sm">Lưu thay đổi</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
