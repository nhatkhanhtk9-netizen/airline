<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Quản lý Users</h2>

    <!-- Form thêm/sửa user -->
    <form id="userForm" class="mb-4">
        <input type="hidden" id="userId">
        <div class="mb-3">
            <label>Tên</label>
            <input type="text" id="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Email</label>
            <input type="email" id="email" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Điện thoại</label>
            <input type="text" id="phone" class="form-control">
        </div>
        <div class="mb-3">
            <label>Ngày sinh</label>
            <input type="date" id="birthday" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Lưu</button>
        <button type="button" class="btn btn-secondary" onclick="resetForm()">Hủy</button>
    </form>

    <!-- Bảng danh sách users -->
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Email</th>
                <th>Điện thoại</th>
                <th>Ngày sinh</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
            <!-- Dữ liệu sẽ load từ JS -->
        </tbody>
    </table>
</div>

<script>
const apiUrl = '/api/users';

// Load danh sách users
function loadUsers() {
    fetch(apiUrl)
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';
            data.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td>${user.phone || ''}</td>
                    <td>${user.birthday || ''}</td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="editUser(${user.id})">Sửa</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">Xóa</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });
}

// Thêm hoặc cập nhật user
document.getElementById('userForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const id = document.getElementById('userId').value;
    const userData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        birthday: document.getElementById('birthday').value
    };

    if (id) {
        // Cập nhật
        fetch(`${apiUrl}/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        }).then(() => {
            resetForm();
            loadUsers();
        });
    } else {
        // Thêm mới
        fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        }).then(() => {
            resetForm();
            loadUsers();
        });
    }
});

// Chỉnh sửa user
function editUser(id) {
    fetch(`${apiUrl}/${id}`)
        .then(res => res.json())
        .then(user => {
            document.getElementById('userId').value = user.id;
            document.getElementById('name').value = user.name;
            document.getElementById('email').value = user.email;
            document.getElementById('phone').value = user.phone;
            document.getElementById('birthday').value = user.birthday;
        });
}

// Xóa user
function deleteUser(id) {
    if (confirm('Bạn có chắc chắn muốn xóa user này?')) {
        fetch(`${apiUrl}/${id}`, { method: 'DELETE' })
            .then(() => loadUsers());
    }
}

// Reset form
function resetForm() {
    document.getElementById('userId').value = '';
    document.getElementById('userForm').reset();
}

// Load dữ liệu khi trang mở
loadUsers();
</script>
</body>
</html>
