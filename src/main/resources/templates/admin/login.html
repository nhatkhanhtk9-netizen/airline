<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - FlyBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: #fff;
        }
        .login-card h2 {
            font-weight: bold;
            color: #333;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .btn-admin {
            background-color: #343a40;
            color: white;
            font-weight: bold;
        }
        .btn-admin:hover {
            background-color: #23272b;
            color: white;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Admin Portal</h2>
    
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    
    <form th:action="@{/admin/login}" method="POST">
        <div class="mb-3">
            <label for="email" class="form-label">Email quản trị</label>
            <input type="email" class="form-control" id="email" name="email" required placeholder="admin@airline.com">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Mật khẩu</label>
            <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••">
        </div>
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-admin">Đăng nhập Quản trị</button>
        </div>
    </form>
    
    <div class="text-center mt-3">
        <a href="/" class="text-muted small">Quay lại trang chủ</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
