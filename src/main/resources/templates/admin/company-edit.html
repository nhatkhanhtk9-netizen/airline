<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa nội dung - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; }
        .main-container { max-width: 900px; margin: 50px auto; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 40px; }
        .form-label { font-weight: 600; color: #444; }
        .form-control:focus { border-color: #3498db; box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.1); }
    </style>
</head>
<body>
    <div class="container main-container">
        <div class="mb-4">
            <a href="/admin/company" class="text-decoration-none text-muted">
                <i class="fas fa-arrow-left me-1"></i> Quay lại danh sách
            </a>
        </div>

        <div class="card">
            <h3 class="fw-bold mb-4">Chỉnh sửa trang: <span class="text-primary text-uppercase" th:text="${info.type}"></span></h3>
            
            <form th:action="@{/admin/company/update}" method="post" th:object="${info}">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{type}">

                <div class="mb-4">
                    <label class="form-label">Tiêu đề trang</label>
                    <input type="text" class="form-control form-control-lg" th:field="*{title}" required placeholder="Nhập tiêu đề...">
                </div>

                <div class="mb-4">
                    <label class="form-label">Nội dung chi tiết</label>
                    <textarea class="form-control" th:field="*{content}" rows="12" required placeholder="Nhập nội dung trang..."></textarea>
                    <div class="form-text mt-2 text-muted">
                        <i class="fas fa-info-circle me-1"></i> Mẹo: Bạn có thể nhập văn bản dài để mô tả chi tiết trang thông tin.
                    </div>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-5">
                    <button type="submit" class="btn btn-primary btn-lg px-5 rounded-pill">
                        <i class="fas fa-save me-2"></i> Lưu thay đổi
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
