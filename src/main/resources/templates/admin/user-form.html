<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Sửa người dùng' : 'Thêm người dùng'">Người dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .sidebar { height: 100vh; background-color: #343a40; color: white; padding-top: 20px; position: fixed; width: inherit; }
        .sidebar .nav-link { color: #ccc; padding: 12px 20px; transition: all 0.3s ease; border-radius: 8px; margin: 4px 10px; }
        .sidebar .nav-link:hover { background-color: #495057; color: #fff; transform: translateX(10px); font-weight: bold; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .sidebar .nav-link.active { color: white; background-color: #0d6efd; font-weight: bold; }
        .main-content { margin-left: 16.666667%; padding: 30px; }
        .form-hint { font-size: 0.85rem; color: #6c757d; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 sidebar px-0">
            <div class="text-center mb-4"><h4 class="fw-bold">FlyBooking Admin</h4></div>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin}">📊 Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/flights}">✈️ Quản lý Chuyến bay</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/admin/users}">👥 Quản lý Người dùng</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/bookings}">🎫 Quản lý Đặt chỗ</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/support}">🎧 Quản lý Hỗ trợ</a></li>
                <li class="nav-item mt-5"><a class="nav-link text-danger" th:href="@{/logout}">🚪 Đăng xuất</a></li>
            </ul>
        </nav>

        <main class="col-md-10 main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold m-0" th:text="${isEdit} ? 'Sửa người dùng' : 'Thêm người dùng'">Người dùng</h2>
                <a th:href="@{/admin/users}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Quay lại
                </a>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="card shadow-sm border-0 rounded-4" style="max-width: 800px;">
                <div class="card-body p-4">
                    <form th:action="@{/admin/users/save}" th:object="${user}" method="post" novalidate>
                        <input type="hidden" th:field="*{id}">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Họ tên</label>
                                <input type="text" th:field="*{fullName}" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Số điện thoại</label>
                                <input type="text" th:field="*{phone}" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Email</label>
                                <input type="email" th:field="*{email}" class="form-control" required>
                                <div class="form-hint mt-1">Email là duy nhất.</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Vai trò</label>
                                <select th:field="*{admin}" class="form-select">
                                    <option th:value="${false}">Người dùng</option>
                                    <option th:value="${true}">Quản trị viên</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">Mật khẩu mới</label>
                                <input type="password" name="newPassword" class="form-control" placeholder="Để trống nếu không đổi">
                                <div class="form-hint mt-1">Nếu user chưa có mật khẩu (tạo từ đặt vé/đặt phòng), bạn có thể đặt mật khẩu tại đây.</div>
                            </div>
                        </div>

                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">Lưu</button>
                            <a th:href="@{/admin/users}" class="btn btn-outline-secondary px-4">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
