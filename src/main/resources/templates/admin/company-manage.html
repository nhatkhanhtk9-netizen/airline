<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý thông tin công ty - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; }
        .sidebar { height: 100vh; background: #2c3e50; color: white; padding-top: 20px; position: fixed; width: 250px; }
        .sidebar a { color: #bdc3c7; text-decoration: none; padding: 12px 20px; display: block; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; color: white; border-left: 4px solid #3498db; }
        .main-content { margin-left: 250px; padding: 30px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center mb-4">FlyBooking Admin</h4>
        <a href="/admin"><i class="fas fa-home me-2"></i> Dashboard</a>
        <a href="/admin/bookings"><i class="fas fa-ticket-alt me-2"></i> Quản lý đặt vé</a>
        <a href="/admin/company" class="active"><i class="fas fa-info-circle me-2"></i> Thông tin công ty</a>
        <a href="/admin/users"><i class="fas fa-users me-2"></i> Người dùng</a>
        <hr>
        <a href="/logout" class="text-danger"><i class="fas fa-sign-out-alt me-2"></i> Đăng xuất</a>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Quản lý trang thông tin công ty</h2>
        </div>

        <div th:if="${message}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
            <i class="fas fa-check-circle me-2"></i> <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Loại trang</th>
                            <th>Tiêu đề</th>
                            <th>Nội dung tóm tắt</th>
                            <th class="text-end">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="info : ${companyInfos}">
                            <td>
                                <span class="badge bg-primary text-uppercase" th:text="${info.type}"></span>
                            </td>
                            <td class="fw-bold" th:text="${info.title}"></td>
                            <td>
                                <span class="text-muted small" th:text="${#strings.abbreviate(info.content, 80)}"></span>
                            </td>
                            <td class="text-end">
                                <a th:href="@{/admin/company/edit/{id}(id=${info.id})}" class="btn btn-sm btn-outline-primary rounded-pill">
                                    <i class="fas fa-edit me-1"></i> Chỉnh sửa
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
