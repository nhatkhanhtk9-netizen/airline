<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin hành khách - FlyBooking</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style th:replace="~{fragments/header :: header-styles}"></style>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0f8ff; 
            color: #1a1a1a;
        }
        .navbar {
            background: #ffffff;
            box-shadow: 0 2px 10px rgba(0, 191, 255, 0.1);
            padding: 1rem 0;
        }
        .booking-steps {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            gap: 10px;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #adb5bd;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .step.active { color: #00BFFF; }
        .step.active .step-num { background: #00BFFF; color: white; box-shadow: 0 4px 10px rgba(0, 191, 255, 0.3); }
        .step-num {
            width: 28px;
            height: 28px;
            background: #e9ecef;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        .step-line {
            width: 50px;
            height: 2px;
            background: #e9ecef;
            align-self: center;
        }
        .form-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 191, 255, 0.08);
            padding: 35px;
            margin-bottom: 40px;
            border: 1px solid #e1f5fe;
        }
        .section-title {
            font-weight: 700;
            color: #00BFFF;
            border-bottom: 2px solid #f0f8ff;
            padding-bottom: 12px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #495057;
            margin-bottom: 8px;
        }
        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1.5px solid #e1f5fe;
            background-color: #fcfdfe;
            transition: all 0.2s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: #00BFFF;
            box-shadow: 0 0 0 4px rgba(0, 191, 255, 0.1);
            background-color: #fff;
        }
        .btn-confirm {
            background: linear-gradient(135deg, #00BFFF 0%, #0091EA 100%);
            border: none;
            color: white;
            padding: 16px 50px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 191, 255, 0.2);
        }
        .btn-confirm:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 191, 255, 0.3);
            color: white;
        }
        .input-group-text {
            border-radius: 12px 0 0 12px;
            border: 1.5px solid #e1f5fe;
            border-right: none;
            background-color: #f0f8ff;
            color: #00BFFF;
        }
        .form-control.border-start-0 {
            border-radius: 0 12px 12px 0;
        }
        @media (max-width: 768px) {
            .booking-steps { display: none; }
            .form-card { padding: 20px; }
            .btn-confirm { width: 100%; padding: 14px; }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">
    <!-- Progress Steps -->
    <div class="booking-steps mt-5">
        <div class="step"><div class="step-num">1</div> Chọn chuyến bay</div>
        <div class="step-line"></div>
        <div class="step active"><div class="step-num">2</div> Thông tin hành khách</div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">3</div> Xác nhận</div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">4</div> Thanh toán</div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="form-card">
                <form th:action="@{/flight/submit}" method="post" class="row g-4">
                    <h4 class="section-title"><i class="fas fa-plane"></i> Thông tin chuyến bay</h4>
                    
                    <div class="col-md-6">
                        <label for="from" class="form-label">Nơi đi</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-map-marker-alt text-primary"></i></span>
                            <input type="text" id="from" name="from" class="form-control border-start-0" placeholder="Ví dụ: TP.HCM" th:value="${prefillFrom}" required>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="to" class="form-label">Nơi đến</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-map-marker-alt text-success"></i></span>
                            <input type="text" id="to" name="to" class="form-control border-start-0" placeholder="Ví dụ: Hà Nội" th:value="${prefillTo}" required>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="departureDate" class="form-label">Ngày đi</label>
                        <input type="date" id="departureDate" name="departureDate" class="form-control" th:value="${prefillDepartureDate}" required>
                    </div>

                    <div class="col-md-6">
                        <label for="returnDate" class="form-label">Ngày về (Không bắt buộc)</label>
                        <input type="date" id="returnDate" name="returnDate" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label for="passenger" class="form-label">Số hành khách</label>
                        <input type="number" id="passenger" name="passenger" class="form-control" min="1" value="1" required>
                    </div>

                    <div class="col-md-6">
                        <label for="classType" class="form-label">Hạng ghế</label>
                        <select id="classType" name="classType" class="form-select" required>
                            <option value="economy">Economy (Phổ thông)</option>
                            <option value="business">Business (Thương gia)</option>
                            <option value="first">First Class (Hạng nhất)</option>
                        </select>
                    </div>

                    <h4 class="section-title mt-5"><i class="fas fa-user"></i> Thông tin người đặt vé</h4>
                    
                    <div class="col-md-6">
                        <label for="fullName" class="form-label">Họ và tên</label>
                        <input type="text" id="fullName" name="fullName" class="form-control" placeholder="Nguyễn Văn A" th:value="${prefillFullName}" required>
                    </div>

                    <div class="col-md-6">
                        <label for="email" class="form-label">Email nhận vé</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="a@example.com" th:value="${prefillEmail}" required>
                    </div>

                    <div class="col-md-6">
                        <label for="phone" class="form-label">Số điện thoại</label>
                        <input type="text" id="phone" name="phone" class="form-control" placeholder="0901234567" th:value="${prefillPhone}" required>
                    </div>

                    <div class="col-md-6">
                        <label for="idCard" class="form-label">CMND/CCCD/Hộ chiếu</label>
                        <input type="text" id="idCard" name="idCard" class="form-control" placeholder="123456789" required>
                    </div>

                    <div class="col-12 text-center mt-5">
                        <button type="submit" class="btn-confirm px-5 py-3">
                            Tiếp tục: Xác nhận thông tin <i class="fas fa-arrow-right ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
