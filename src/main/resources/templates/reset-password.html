<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - FlyBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: url('/images/nen1.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }
        .reset-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 450px;
            padding: 15px;
        }
        .reset-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        .reset-card h2 {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }
        .reset-card p {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #ddd;
        }
        .btn-reset {
            background: linear-gradient(45deg, #0d6efd, #00d2ff);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.4);
            color: white;
        }
        .alert {
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="reset-container">
    <div class="reset-card">
        <h2>Đặt lại mật khẩu</h2>
        <p>Vui lòng nhập mật khẩu mới của bạn.</p>
        
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        
        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">
            
            <div class="mb-3">
                <label for="password" class="form-label small fw-bold">Mật khẩu mới</label>
                <input type="password" name="password" class="form-control" id="password" placeholder="••••••••" required minlength="6">
            </div>
            
            <div class="mb-4">
                <label for="confirmPassword" class="form-label small fw-bold">Xác nhận mật khẩu mới</label>
                <input type="password" name="confirmPassword" class="form-control" id="confirmPassword" placeholder="••••••••" required minlength="6">
            </div>
            
            <button type="submit" class="btn btn-reset w-100 shadow-sm">Cập nhật mật khẩu</button>
        </form>
    </div>
</div>

</body>
</html>
