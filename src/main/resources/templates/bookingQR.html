<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán vé máy bay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        #qrcode { margin: 20px auto; width: 200px; height: 200px; }
    </style>
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center">Thanh toán vé máy bay</h2>

    <div class="row mt-4">
        <div class="col-md-6">
            <p><strong>Họ và tên:</strong> <span th:text="${booking.fullName}"></span></p>
            <p><strong>Email:</strong> <span th:text="${booking.email}"></span></p>
            <p><strong>Số điện thoại:</strong> <span th:text="${booking.phone}"></span></p>
            <p><strong>Đi từ:</strong> <span th:text="${booking.fromCity}"></span></p>
            <p><strong>Đến:</strong> <span th:text="${booking.toCity}"></span></p>
            <p><strong>Ngày bay:</strong> <span th:text="${booking.date}"></span></p>

            <div class="mb-3">
                <label>Số hành khách</label>
                <input type="number" id="passengers" class="form-control"
                       th:value="${booking.passengers}" min="1">
            </div>
            <div class="mb-3">
                <label>Giá vé (VND)</label>
                <input type="number" id="pricePerTicket" class="form-control"
                       th:value="${booking.pricePerTicket}" min="0">
            </div>
            <p><strong>Tổng thanh toán:</strong> <span id="totalPrice" class="fw-bold"
                                                      th:text="${booking.totalPrice} + ' VND'"></span></p>
        </div>

        <div class="col-md-6 text-center">
            <div id="qrcode"></div>
            <p>Quét QR để thanh toán</p>
        </div>
    </div>
</div>

<script th:inline="javascript">
    /* Biến QR từ Spring */
    var qrData = /*[[${qrData}]]*/ 'https://payment.example.com';

    // Khởi tạo QR
    var qrCode = new QRCode(document.getElementById("qrcode"), {
        text: qrData,
        width: 200,
        height: 200
    });

    // Tính tổng tiền
    function calculateTotal() {
        var price = parseInt(document.getElementById('pricePerTicket').value) || 0;
        var passengers = parseInt(document.getElementById('passengers').value) || 0;
        var total = price * passengers;
        document.getElementById('totalPrice').innerText = total.toLocaleString('vi-VN') + ' VND';
        return total;
    }

    // AJAX cập nhật booking
    function updateBooking() {
        var bookingId = /*[[${booking.id}]]*/ 0;
        var passengers = parseInt(document.getElementById('passengers').value) || 1;
        var price = parseInt(document.getElementById('pricePerTicket').value) || 0;

        fetch('/booking/update/' + bookingId, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ passengers: passengers, pricePerTicket: price })
        }).then(res => {
            if(res.ok) {
                calculateTotal();

                // Update QR URL nếu muốn QR dựa trên tổng tiền
                var newQrData = "https://payment.example.com/pay?amount=" + (price*passengers) + "&bookingId=" + bookingId;
                document.getElementById('qrcode').innerHTML = '';
                qrCode = new QRCode(document.getElementById("qrcode"), {
                    text: newQrData,
                    width: 200,
                    height: 200
                });
            }
        });
    }

    // Lắng nghe thay đổi input
    document.getElementById('passengers').addEventListener('input', updateBooking);
    document.getElementById('pricePerTicket').addEventListener('input', updateBooking);
</script>
</body>
</html>
