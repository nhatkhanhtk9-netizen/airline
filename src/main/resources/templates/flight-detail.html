<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết chuyến bay - FlyBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style th:replace="~{fragments/header :: header-styles}"></style>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0f8ff; 
            color: #1a1a1a;
        }
        .detail-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 191, 255, 0.1);
            overflow: hidden;
            margin-top: 40px;
            margin-bottom: 40px;
        }
        .detail-header {
            background: linear-gradient(135deg, #00BFFF 0%, #0091EA 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .detail-body {
            padding: 40px;
        }
        .airline-logo-large {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .airline-logo-large img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .route-info-large {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 30px 0;
        }
        .city-box {
            text-align: center;
            flex: 1;
        }
        .city-name {
            font-size: 1.5rem;
            font-weight: 800;
            color: #00BFFF;
            margin-bottom: 5px;
        }
        .airport-code {
            color: #6c757d;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .time-display {
            font-size: 2.5rem;
            font-weight: 800;
            color: #2c3e50;
        }
        .flight-path {
            flex: 1.5;
            position: relative;
            text-align: center;
            padding: 0 20px;
        }
        .path-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #00BFFF, transparent);
            margin: 15px 0;
            position: relative;
        }
        .path-line::after {
            content: "✈️";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            background: white;
            padding: 0 10px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
            padding: 20px;
            background: #f8fbff;
            border-radius: 15px;
        }
        .info-item {
            display: flex;
            flex-direction: column;
        }
        .info-label {
            font-size: 0.8rem;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .info-value {
            font-weight: 700;
            color: #212529;
        }
        .price-section {
            text-align: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px dashed #e1f5fe;
        }
        .price-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ff5e1f;
        }
        .btn-book-now {
            background: linear-gradient(45deg, #ff5e1f, #ff8a50);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 94, 31, 0.2);
            text-decoration: none;
            display: inline-block;
        }
        .btn-book-now:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 94, 31, 0.3);
            color: white;
        }
        @media (max-width: 768px) {
            .route-info-large { flex-direction: column; gap: 20px; }
            .time-display { font-size: 1.8rem; }
            .info-grid { grid-template-columns: 1fr; }
            .detail-body { padding: 20px; }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="detail-card">
                <div class="detail-header">
                    <h3 class="mb-0">Chi tiết chuyến bay</h3>
                    <p class="mb-0 opacity-75" th:text="'Mã chuyến bay: ' + ${flight.flightNumber}">VJ123</p>
                </div>
                
                <div class="detail-body">
                    <div class="airline-logo-large">
                        <img th:if="${#strings.startsWith(flight.flightNumber, 'VJ')}" src="https://image.vietjetair.com/api/RenderImage?fileName=logo-vj1611546116111.png" alt="VietJet Air" />
                        <img th:if="${#strings.startsWith(flight.flightNumber, 'VN')}" src="https://www.vietnamairlines.com/style%20library/vietnamairlines/article/logo.png" alt="Vietnam Airlines" />
                        <img th:if="${#strings.startsWith(flight.flightNumber, 'QH')}" src="https://www.bambooairways.com/RESOURCES/BambooAirways/images/logo.png" alt="Bamboo Airways" />
                        <img th:if="${!#strings.startsWith(flight.flightNumber, 'VJ') and !#strings.startsWith(flight.flightNumber, 'VN') and !#strings.startsWith(flight.flightNumber, 'QH')}" 
                             src="https://img.icons8.com/color/96/airplane-take-off.png" alt="Flight Logo" />
                    </div>
                    
                    <div class="text-center mb-4">
                        <h4 class="fw-bold mb-1" th:text="${airlineName}">VietJet Air</h4>
                        <span class="badge bg-light text-primary border border-primary-subtle px-3 py-2 rounded-pill">Hạng Phổ thông</span>
                    </div>

                    <div class="route-info-large">
                        <div class="city-box">
                            <div class="city-name" th:text="${flight.origin}">Hà Nội</div>
                            <div class="airport-code" th:text="${airportCodeByCity[flight.origin]}">HAN</div>
                            <div class="time-display mt-2" th:text="${#temporals.format(flight.departureTime, 'HH:mm')}">08:00</div>
                        </div>
                        
                        <div class="flight-path">
                            <div class="path-line"></div>
                            <div class="small text-muted fw-bold">2h 10m</div>
                        </div>
                        
                        <div class="city-box">
                            <div class="city-name" th:text="${flight.destination}">TP.HCM</div>
                            <div class="airport-code" th:text="${airportCodeByCity[flight.destination]}">SGN</div>
                            <div class="time-display mt-2" th:text="${#temporals.format((flight.arrivalTime != null ? flight.arrivalTime : flight.departureTime.plusHours(2)), 'HH:mm')}">10:10</div>
                        </div>
                    </div>

                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">Ngày khởi hành</span>
                            <span class="info-value" th:text="${#temporals.format(flight.departureTime, 'dd MMMM, yyyy')}">25 Tháng 3, 2026</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Sân bay đi</span>
                            <span class="info-value" th:text="${airportNameByCity[flight.origin] + ' (' + airportCodeByCity[flight.origin] + ')'}">Nội Bài (HAN)</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Sân bay đến</span>
                            <span class="info-value" th:text="${airportNameByCity[flight.destination] + ' (' + airportCodeByCity[flight.destination] + ')'}">Tân Sơn Nhất (SGN)</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Loại máy bay</span>
                            <span class="info-value">Airbus A321 Neo</span>
                        </div>
                    </div>

                    <div class="price-section">
                        <div class="small text-muted mb-1">Giá vé mỗi hành khách</div>
                        <div class="price-value" th:text="${#numbers.formatInteger(flight.price, 3, 'POINT') + ' VNĐ'}">1.200.000 VNĐ</div>
                        <div class="mt-4">
                            <a th:href="@{/flight/form(flightId=${flight.id})}" class="btn-book-now">
                                <i class="fas fa-ticket-alt me-2"></i> Đặt vé ngay bây giờ
                            </a>
                        </div>
                        <div class="mt-3">
                            <a href="javascript:history.back()" class="text-muted text-decoration-none small">
                                <i class="fas fa-arrow-left me-1"></i> Quay lại danh sách
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/header :: footer}"></div>

</body>
</html>
